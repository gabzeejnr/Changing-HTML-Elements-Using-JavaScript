<!DOCTYPE html>
<html>
  <head>
    <title>Changing HTML text and so-on</title>
    <link rel="icon" href="assets/image1.png">
    <style>
    
      div{
        display: flex;
        justify-content: center;
      }
      
      h1{
        text-align: center;
        margin-bottom: 3rem;
      }
      
      .bulb_div{
        display: flex;
        justify-content: center;
        margin-top: 3rem;
      }
      
      #lightBulb{
        padding: 1rem;
        background-color: blue;
        border-radius: 5px;
      }
      
      #lightBulb:hover{
        background-image:linear-gradient(to right, blue, red);
      }
    </style>
  </head>
  <body>
    <p>
      <h1>Changing HTML elements using Javascript!!</h1>
    </p>
    <div>
      <img
      src="https://www.image2url.com/r2/default/images/1776396026210-767c2b72-5ccc-42a9-b8d7-9ca4d12f7e26.png"
      id="image">
    </div>
    <div class="bulb_div">
      <button id="lightBulb" onclick="change()">Click to turn me on🤤</button>
    </div>
    <script>
      let Changed = true
      function change() {
        let light = document.getElementById('image')
        let but = document.getElementById('lightBulb')
        
        
        if (!Changed) {
          light.src='https://www.image2url.com/r2/default/images/1776396026210-767c2b72-5ccc-42a9-b8d7-9ca4d12f7e26.png'
          but.innerHTML="Click to turn me on🤤"
          Changed = true
        } else {
          light.src='https://www.image2url.com/r2/default/images/1776396157613-c0b89346-8ea3-4fab-a654-111a1253d778.png'
          but.innerHTML="Turn Me off, I'm done!!"
          Changed = false
        }
      }
    </script>
  </body>
</html>
